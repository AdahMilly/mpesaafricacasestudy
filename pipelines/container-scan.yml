jobs:
  - job: ContainerSecurityScan
    displayName: Scan Docker Image with Trivy
    pool:
      vmImage: ubuntu-latest

    steps:
      - checkout: self

      - task: DockerInstaller@0
        displayName: Install Docker
        inputs:
          dockerVersion: "latest"

      - script: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO- https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
        displayName: Install Trivy

      - script: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --no-progress \
            $(ACR_LOGIN_SERVER)/$(IMAGE_REPOSITORY):${{ parameters.imageTag }}
        displayName: Scan Container Image

      - script: |
          trivy image \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --no-progress \
            $(ACR_LOGIN_SERVER)/$(IMAGE_REPOSITORY):${{ parameters.imageTag }}
        displayName: Generate SARIF Report
        condition: always()

      - task: PublishBuildArtifacts@1
        displayName: Publish Trivy Results
        condition: always()
        inputs:
          PathtoPublish: trivy-results.sarif
          ArtifactName: trivy-security-report
          publishLocation: Container
